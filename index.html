<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV ProMaker</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #eef3f9;
      color: #111827;
    }

    a {
      text-decoration: none;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
    }

    .logo span {
      color: #3b82f6;
    }

    .nav-menu {
      display: flex;
      gap: 30px;
      font-weight: 500;
      color: #4b5563;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .btn {
      background: #3b82f6;
      color: white;
      padding: 10px 20px;
      border-radius: 25px;
      font-weight: bold;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 100px 20px;
    }

    .hero h1 {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 20px;
    }

    .hero h1 span {
      color: #3b82f6;
      display: block;
    }

    .hero p {
      font-size: 18px;
      color: #4b5563;
      max-width: 700px;
      margin: auto;
      line-height: 1.6;
    }

    @media (max-width: 768px) {
      .hero h1 {
        font-size: 32px;
      }

      .nav-menu {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">CV <span>ProMaker</span></div>

    <div class="nav-menu">
      <a href="#">Beranda</a>
      <a href="#">Katalog CV</a>
      <a href="#">Testimoni</a>
    </div>

    <div class="nav-right">
      <a href="/order-cv" class="btn">Pesan Sekarang</a>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>
      Buat HRD Terkesan dengan
      <span>CV Profesional Anda</span>
    </h1>

    <p>
      Tingkatkan peluang panggilan interview hingga 80%. Pilih desain impianmu,
      isi data, dan biarkan tim ahli kami yang merapikannya.
    </p>
  </div>

</body>
</html>
